version: 2

before:
  hooks:
    - go mod download

builds:
  - id: "moca-storage-provider-linux"
    main: ./cmd/storage_provider
    binary: bin/moca-sp
    env:
      - CGO_ENABLED=1
      - CC=gcc
      - CXX=g++
    goos:
      - linux
    goarch:
      - amd64
    flags:
      - -tags=cgo
    ldflags:
      - -X main.Version={{.Version}}
      - -X main.CommitID={{.Commit}}
      - -X main.BranchName={{.Branch}}
      - -X main.BuildTime={{.Date}}
      - -X github.com/mocachain/moca-storage-provider/store/bsdb.AppVersion={{.Version}}
      - -X github.com/mocachain/moca-storage-provider/store/bsdb.GitCommit={{.Commit}}
      - -X github.com/mocachain/moca-storage-provider/store/bsdb.GitCommitDate={{.CommitDate}}

  - id: "moca-storage-provider-linux-arm64"
    main: ./cmd/storage_provider
    binary: bin/moca-sp
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
      - CXX=aarch64-linux-gnu-g++
    goos:
      - linux
    goarch:
      - arm64
    flags:
      - -tags=cgo
    ldflags:
      - -X main.Version={{.Version}}
      - -X main.CommitID={{.Commit}}
      - -X main.BranchName={{.Branch}}
      - -X main.BuildTime={{.Date}}
      - -X github.com/mocachain/moca-storage-provider/store/bsdb.AppVersion={{.Version}}
      - -X github.com/mocachain/moca-storage-provider/store/bsdb.GitCommit={{.Commit}}
      - -X github.com/mocachain/moca-storage-provider/store/bsdb.GitCommitDate={{.CommitDate}}

dockers:
  - id: moca-sp-amd64
    ids:
      - moca-storage-provider-linux
    image_templates:
      - "ghcr.io/mocachain/moca-storage-provider:{{ .Version }}-amd64"
      - "ghcr.io/mocachain/moca-storage-provider:latest-amd64"
    dockerfile: Dockerfile.release
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=moca-storage-provider"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/mocachain/moca-storage-provider"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"

  - id: moca-sp-arm64
    ids:
      - moca-storage-provider-linux-arm64
    image_templates:
      - "ghcr.io/mocachain/moca-storage-provider:{{ .Version }}-arm64"
      - "ghcr.io/mocachain/moca-storage-provider:latest-arm64"
    dockerfile: Dockerfile.release
    use: buildx
    goarch: arm64
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=moca-storage-provider"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/mocachain/moca-storage-provider"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"

docker_manifests:
  - name_template: "ghcr.io/mocachain/moca-storage-provider:{{ .Version }}"
    image_templates:
      - "ghcr.io/mocachain/moca-storage-provider:{{ .Version }}-amd64"
      - "ghcr.io/mocachain/moca-storage-provider:{{ .Version }}-arm64"
  - name_template: "ghcr.io/mocachain/moca-storage-provider:latest"
    image_templates:
      - "ghcr.io/mocachain/moca-storage-provider:latest-amd64"
      - "ghcr.io/mocachain/moca-storage-provider:latest-arm64"

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Os }}_{{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

checksum:
  name_template: "checksums.txt"

release:
  replace_existing_artifacts: true
