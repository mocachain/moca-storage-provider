name: P2P Unit Test

on:
  push:
    branches:
      - main
      - develop
      - fix-release*
  pull_request:
    branches:

permissions:
  contents: read

jobs:
  p2p-test:
    runs-on: ubuntu-latest
    steps:
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.x

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run P2P coverage gate
        run: make check-p2p-coverage
