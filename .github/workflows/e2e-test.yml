name: SP E2E Test

on:
  push:
    branches:
      - main
      - develop
      - fix-release*

  pull_request:
    branches:

jobs:
  e2e-test:
    strategy:
      matrix:
        go-version: [ 1.23.x ]
        os: [ ubuntu-latest ]
    runs-on: ubuntu-latest

    steps:
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      # Checkout Moca-SP
      - name: Checkout Moca-SP
        uses: actions/checkout@v4
      # Run MySQL
      - name: Run MySQL
        run: |
          sudo /etc/init.d/mysql start
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '14.x'
      - name: Install dependencies
        run: npm install ethers
      # generate test private key
      - name: Generate private key
        run: node ./.github/workflows/generate-private-key.js
        id: generate-private-key
      - name: set private key and account address as job variables
        run: |
          echo "Private key: ${{ steps.generate-private-key.outputs.private_key }}"
          echo "Account address: ${{ steps.generate-private-key.outputs.account_address }}"
          echo "PRIVATE_KEY=${{ steps.generate-private-key.outputs.private_key }}" >> "$GITHUB_ENV"
          echo "ACCOUNT_ADDR=${{ steps.generate-private-key.outputs.account_address }}" >> "$GITHUB_ENV"
      # Build and Start Moca Blockchain
      - name: Build and Start Moca Blockchain
        run: |
          mkdir -p .github/action-logs
          set -o pipefail
          bash ./test/e2e/spworkflow/e2e_test.sh --startChain 2>&1 | tee .github/action-logs/sp-e2e-start-chain.log
      # Build and Start Moca SP
      - name: Build and Start Moca SP
        run: |
          mkdir -p .github/action-logs
          set -o pipefail
          bash ./test/e2e/spworkflow/e2e_test.sh --startSP 2>&1 | tee .github/action-logs/sp-e2e-start-sp.log
      # Build Moca Cmd
      - name: Build Moca Cmd
        run: |
          mkdir -p .github/action-logs
          set -o pipefail
          bash ./test/e2e/spworkflow/e2e_test.sh --buildCmd 2>&1 | tee .github/action-logs/sp-e2e-build-cmd.log
      # Use Moca Cmd Running SP E2E Test
      - name: Run Moca SP E2E Test
        run: |
          mkdir -p .github/action-logs
          set -o pipefail
          bash ./test/e2e/spworkflow/e2e_test.sh --runTest 2>&1 | tee .github/action-logs/sp-e2e-run-test.log
      - name: Upload SP E2E diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sp-e2e-diagnostics
          if-no-files-found: ignore
          path: |
            .github/action-logs/
            deployment/localup/local_env/**/log.txt
            moca/deployment/localup/.local/**/*.log
            moca/sp.json
