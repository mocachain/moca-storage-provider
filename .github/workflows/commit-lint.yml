name: Commit Lint

on:
  push:
    branches:
      - main
      - develop
      - fix-release*

  pull_request:
    branches:

jobs:
  commit-message-lint:
    strategy:
      matrix:
        node-version: [22.x]
        os: [ ubuntu-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Deps
        run: |
          npm install --no-save @commitlint/cli @commitlint/config-conventional commitlint-plugin-function-rules

      - name: Lint PR commits
        if: github.event_name == 'pull_request'
        run: >-
          npx commitlint
          --config .github/commitlint.config.js
          --from ${{ github.event.pull_request.base.sha }}
          --to ${{ github.event.pull_request.head.sha }}
          --verbose

      - name: Lint pushed commit
        if: github.event_name == 'push'
        run: npx commitlint --config .github/commitlint.config.js --last --verbose

