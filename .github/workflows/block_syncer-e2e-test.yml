name: BlockSyncer E2E Test

on:
  push:
    branches:
      - main
      - develop
      - fix-release*

  pull_request:
    branches:

jobs:
  e2e-test:
    strategy:
      matrix:
        go-version: [ 1.23.x ]
        os: [ ubuntu-latest ]
    runs-on: ubuntu-latest
    env:
      BLOCKSYNCER_TEST_VERIFY_TIMEOUT_SECONDS: "300"
      BLOCKSYNCER_TEST_VERIFY_INTERVAL_MS: "1000"

    steps:
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      # Checkout Moca-SP
      - name: Checkout Moca-SP
        uses: actions/checkout@v4
      # Run MySQL
      - name: Run MySQL
        run: |
          sudo /etc/init.d/mysql start
      # Build SP and Make Config.toml
      - name: Build and Make Config
        run: |
          mkdir -p .github/action-logs
          set -o pipefail
          bash ./modular/blocksyncer/test/bs_test.sh --makecfg 2>&1 | tee .github/action-logs/blocksyncer-makecfg.log
      # Reset env
      - name: Reset env
        run: |
          mkdir -p .github/action-logs
          set -o pipefail
          bash ./modular/blocksyncer/test/bs_test.sh --reset 2>&1 | tee .github/action-logs/blocksyncer-reset.log
      # Run Test
      - name: Run Test
        run: |
          mkdir -p .github/action-logs
          set -o pipefail
          bash ./modular/blocksyncer/test/bs_test.sh --start_test 2>&1 | tee .github/action-logs/blocksyncer-run-test.log
      - name: Upload BlockSyncer diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: blocksyncer-e2e-diagnostics
          if-no-files-found: ignore
          path: |
            .github/action-logs/
            modular/blocksyncer/bs-logs/
            modular/blocksyncer/coverage.txt
            modular/blocksyncer/config.toml
